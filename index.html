<!DOCTYPE html><html lang="ru"><head>	<title>Вклады</title>	<meta charset="UTF-8">	<meta name="format-detection" content="telephone=no">	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">	<link rel="stylesheet" href="css/style.min.css">	<link rel="shortcut icon" href="favicon.ico">	<!-- <meta name="robots" content="noindex, nofollow"> -->	<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"> -->	<meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body>	<div class="wrapper">		<header class="header">	<div class="header__wrapper _container">		<div class="header__body">			<div class="header__line">				<div class="header__logo">					<a href="#"><picture><source srcset="img/logo.webp" type="image/webp"><img src="img/logo.jpg" alt="Логотип"></picture></a>				</div>				<div class="header__phone phone-header">					<div class="phone-header__wrapper">						<a href="tel:88001005005" class="phone-header__item">8-800-100-5005</a>						<a href="tel:+73452522000" class="phone-header__item">+7 (3452) 522-000</a>					</div>				</div>			</div>			<div class="header__line">				<div class="header__menu menu">					<div class="menu__icon icon-menu">						<span></span>						<span></span>						<span></span>					</div>					<nav class="menu__body">						<ul class="menu__list">							<li><a href="#" class="menu__link">Кредитные карты</a></li>							<li><a href="#" class="menu__link _active">Вклады</a></li>							<li><a href="#" class="menu__link">Дебетовая карта</a></li>							<li><a href="#" class="menu__link">Страхование</a></li>							<li><a href="#" class="menu__link">Друзья</a></li>							<li><a href="#" class="menu__link">Интернет-банк</a></li>						</ul>					</nav>				</div>			</div>		</div>	</div></header>		<div class="breadcrumbs">   <div class="breadcrumbs__wrapper _container">      <div class="breadcrumbs__body">         <a href="#" class="breadcrumbs__link">Главная</a>         <a href="#" class="breadcrumbs__link">Вклады</a>         <a href="#" class="breadcrumbs__link">Калькулятор</a>      </div>   </div></div>		<main class="page">			<section class="calculator">				<div class="calculator__wrapper _container">					<div class="calculator__body">						<h2 class="calculator__title">Калькулятор</h2>						<form method="POST" action="" class="calculator__form form">							<div class="form__line">								<div class="form-row__labels">									<label for="form-date">Дата оформления вклада</label>								</div>								<div class="form-row__inputs">									<input autocomplete="off" placeholder="дд.мм.гггг" id="datepicker" type="text" name="date"										class="input">								</div>							</div>							<div class="form__line">								<div class="form-row__labels">									<label for="form-deposit-sum__item">Сумма вклада</label>								</div>								<div class="form-row__inputs">									<input id="form-deposit-sum__item" type="text" name="deposit" class="input">								</div>								<div class="form-row__range">									<div class="form-deposit-sum__range">										<div class="range-label__wrapper">											<span class="range-label__item min-range"></span>											<span class="range-label__item max-range _price"></span>										</div>									</div>								</div>							</div>							<div class="form__line">								<div class="form-row__labels">									<label for="form-deposit-sum__item">Срок вклада</label>								</div>								<div class="form-row__inputs">									<select name="term">										<option value="1" selected="selected">1 год</option>										<option value="2">2 года</option>										<option value="3">3 года</option>										<option value="4">4 года</option>										<option value="5">5 лет</option>									</select>								</div>							</div>							<div class="form__line">								<div class="form-row__labels">									<label>Пополнение вклада</label>								</div>								<div class="form-row__inputs form-replenishment__wrapper">									<input id="form-replenishment__no" name="replenishment" checked type="radio" value="0">									<label for="form-replenishment__no">Нет</label>									<input id="form-replenishment__yes" name="replenishment" type="radio" value="1">									<label for="form-replenishment__yes">Да</label>								</div>							</div>							<div class="form__line">								<div class="form-row__labels">									<label for="form-deposit-replenishment__item">Сумма пополнения вклада</label>								</div>								<div class="form-row__inputs">									<input id="form-deposit-replenishment__item" type="text" name="replenishment__sum"										class="input _price">								</div>								<div class="form-row__range">									<div class="form-deposit-replenishment__range">										<div class="range-label__wrapper">											<span class="range-label__item min-range"></span>											<span class="range-label__item max-range _price"></span>										</div>									</div>								</div>							</div>							<div class="form__footer">								<button type="submit" class="form__button">Рассчитать</button>								<p class="form-total">Результат: <span>10 250 руб</span></p>							</div>						</form>					</div>				</div>			</section>		</main>		<footer class="footer">	<div class="footer__content _container">		<div class="footer__body">			<a class="footer__link" href="#">Кредитные карты</a>			<a class="footer__link" href="#">Вклады</a>			<a class="footer__link" href="#">Дебетовая карта</a>			<a class="footer__link" href="#">Страхование</a>			<a class="footer__link" href="#">Друзья</a>			<a class="footer__link" href="#">Интернет-банк</a>		</div>	</div></footer>	</div>	<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script><script src="js/vendors.min.js"></script><script src="js/app.min.js"></script></body></html>
